<!doctype html>

<head>
<meta charset="utf-8">

<meta property="og:description" content="Jogo bíblico OANSE por fases: perguntas, ranking, recompensas e progresso.">
<meta property="og:url" content="https://jaimeleite2012-sketch.github.io/concurso-biblico-oanse/">

<meta name="twitter:description" content="Jogo bíblico OANSE por fases: perguntas, ranking, recompensas e progresso.">
<meta name="twitter:image" content="https://jaimeleite2012-sketch.github.io/concurso-biblico-oanse/share-card.png?v=27.2">
<link rel="icon" href="icon.png?v=27.2">
<link rel="apple-touch-icon" href="icon.png?v=27.2">
<title>Concurso Bíblico Oanse Cordeiro V27</title>
<style>
  :root{color-scheme:dark;--bg:#06101f;--card:#0e1d35;--gold:#f7c948;--txt:#f8fafc;--mut:#a8b3c7;--line:rgba(255,255,255,.13)}
  *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#17365f 0,#06101f 42%,#020617 100%);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;display:grid;place-items:center;padding:20px}.loader{max-width:520px;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:24px;text-align:center;box-shadow:0 18px 45px rgba(0,0,0,.38)}.loader h1{margin:0 0 8px;font-size:28px}.loader p{color:var(--mut);line-height:1.45}.bar{height:10px;background:#08162b;border-radius:999px;overflow:hidden;margin-top:18px}.bar span{display:block;height:100%;width:45%;background:var(--gold);border-radius:999px;animation:load 1.2s infinite alternate}@keyframes load{to{width:100%}}
</style>
</head>
<body>
<div class="loader">
  <h1>Concurso Bíblico Oanse Cordeiro</h1>
  <p>Carregando a versão V27 corrigida com logo limpo, capa de compartilhamento, tela inicial simplificada e liberação rápida das fases.</p>
  <div class="bar"><span></span></div>
</div>
<script>
(async function(){
  const OWNER='jaimeleite2012-sketch';
  const REPO='concurso-biblico-oanse';
  const ORIGINAL_BLOB='ed2833e418ad1cf3b6c6aa3adec6e7d8b134e77a';
  const API='https://api.github.com/repos/'+OWNER+'/'+REPO+'/git/blobs/'+ORIGINAL_BLOB;
  function decodeBase64Utf8(b64){
    const clean=String(b64||'').replace(/\s/g,'');
    const bin=atob(clean);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }
  const patchScript = `<script>
(function(){
  const MAX_PHASES=23;
  const MAX_KIDS_PHASES=5;
  const PROGRESS_KEY='oansec_v11_progress';
  const SESSION_KEY='oansec_v11_session';
  function byId(id){return document.getElementById(id)}
  function toast(msg){
    let d=document.createElement('div');
    d.className='toast';
    d.textContent=msg;
    document.body.appendChild(d);
    setTimeout(function(){d.remove()},2200);
  }
  function goTab(tab){
    document.querySelectorAll('.tabBtn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===tab)});
    document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.id==='tab-'+tab)});
  }
  function ensureStyle(){
    if(byId('v27LayoutStyle'))return;
    const s=document.createElement('style');
    s.id='v27LayoutStyle';
    s.textContent='.v27QuickConfig{width:100%;margin:10px 0 4px}.v27SettingsBlock{margin-top:14px;border-top:1px solid rgba(255,255,255,.13);padding-top:12px}.v27SettingsBlock h3{margin:0 0 4px;color:#fde68a}.v27UnlockBox{margin-top:12px;padding:12px;border:1px dashed rgba(250,204,21,.45);border-radius:16px;background:rgba(250,204,21,.08)}.v27UnlockBox p{margin:6px 0 0;color:#a8b3c7;font-size:13px;line-height:1.4}.v27PlayNote{margin-top:10px;padding:10px;border-radius:15px;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.18);color:#dbeafe;font-size:13px;line-height:1.35}body.kids-mode .v27PlayNote,body.kids-mode .v27UnlockBox p{color:#0b2a5b!important}';
    document.head.appendChild(s);
  }
  function ensureTimerOptions(){
    const sel=byId('timerSeconds');
    if(!sel)return;
    const current=sel.value||'20';
    const options=[3,6,9,12,20,30,45,60];
    sel.innerHTML=options.map(function(v){return '<option value="'+v+'">'+v+' seg</option>'}).join('');
    sel.value=options.map(String).includes(String(current))?String(current):'20';
  }
  function unlockAllPhases(){
    let data={};
    try{data=JSON.parse(localStorage.getItem(PROGRESS_KEY)||'{}')||{}}catch(e){data={}}
    data.unlocked=MAX_PHASES;
    data.kidsUnlocked=MAX_KIDS_PHASES;
    data.phaseBest=data.phaseBest||{};
    data.kidsPhaseBest=data.kidsPhaseBest||{};
    data.medals=data.medals||{};
    data.attempts=data.attempts||0;
    localStorage.setItem(PROGRESS_KEY,JSON.stringify(data));
    localStorage.removeItem(SESSION_KEY);
    toast('Todas as fases disponíveis foram liberadas neste aparelho.');
    setTimeout(function(){location.reload()},750);
  }

  function updateHeroLogo(){
    const img=document.querySelector('.hero .logo');
    if(!img)return;
    img.src='logo.png?v=27.2';
    img.alt='Logo OANSE Cordeiro';
    img.style.objectFit='contain';
    img.style.filter='drop-shadow(0 12px 20px rgba(0,0,0,.45))';
  }
  function updateInternalShareMeta(){
    const values={
      'og:title':'Concurso Bíblico Oanse Cordeiro V27',
      'og:description':'Jogo bíblico OANSE por fases: perguntas, ranking, recompensas e progresso.',
      'og:image':'https://jaimeleite2012-sketch.github.io/concurso-biblico-oanse/share-card.png?v=27.2',
      'og:image:secure_url':'https://jaimeleite2012-sketch.github.io/concurso-biblico-oanse/share-card.png?v=27.2',
      'twitter:title':'Concurso Bíblico Oanse Cordeiro V27',
      'twitter:description':'Jogo bíblico OANSE por fases: perguntas, ranking, recompensas e progresso.',
      'twitter:image':'https://jaimeleite2012-sketch.github.io/concurso-biblico-oanse/share-card.png?v=27.2'
    };
    Object.keys(values).forEach(function(k){
      let m=document.querySelector('meta[property="'+k+'"],meta[name="'+k+'"]');
      if(m)m.setAttribute('content',values[k]);
    });
  }
  function moveRoundSettings(){
    ensureStyle();
    ensureTimerOptions();
    const playCard=document.querySelector('#tab-play .card');
    const settingsCard=document.querySelector('#tab-settings .card');
    if(!playCard||!settingsCard)return;
    if(!byId('openRoundSettings')){
      const btn=document.createElement('button');
      btn.id='openRoundSettings';
      btn.className='btn secondary v27QuickConfig';
      btn.textContent='Configurações da rodada';
      btn.onclick=function(){goTab('settings')};
      const pills=playCard.querySelector('.pillrow');
      if(pills)pills.insertAdjacentElement('afterend',btn);
      const note=document.createElement('div');
      note.id='v27PlayNote';
      note.className='v27PlayNote';
      note.textContent='Tela inicial simplificada: escolha Jogar para iniciar. Fase, tempo, modo, clube, nível e grupos agora ficam na aba Configurações.';
      btn.insertAdjacentElement('afterend',note);
    }
    let block=byId('roundSettingsBlock');
    if(!block){
      block=document.createElement('div');
      block.id='roundSettingsBlock';
      block.className='v27SettingsBlock';
      block.innerHTML='<h3>Configuração da rodada</h3><div class="fieldHelp">Ajuste aqui fase, tempo, modo, clube, nível, trilha visual e grupos antes de iniciar.</div>';
      const audioRow=byId('audioOpt')?byId('audioOpt').closest('.row'):null;
      settingsCard.insertBefore(block,audioRow||settingsCard.children[1]||null);
    }
    const ids=['phase','timerSeconds','gameType','mode','questionScope','clubSelect','manualConfigRow','level','visualTheme','teamCount','teamNames','status'];
    const moved=[];
    ids.forEach(function(id){
      const el=byId(id);
      if(!el)return;
      const container=el.closest('.row')||el;
      if(moved.indexOf(container)===-1){moved.push(container)}
    });
    moved.forEach(function(node){block.appendChild(node)});
    if(!byId('unlockAllPhases')){
      const box=document.createElement('div');
      box.className='v27UnlockBox';
      box.innerHTML='<button class="btn primary" id="unlockAllPhases" style="width:100%">Liberar todas as fases</button><p>Um clique libera todas as fases disponíveis neste aparelho. A qualquer momento você pode usar “Zerar progresso” para voltar ao início.</p>';
      block.appendChild(box);
    }
    const unlockBtn=byId('unlockAllPhases');
    if(unlockBtn)unlockBtn.onclick=unlockAllPhases;
  }
  function install(){
    try{updateHeroLogo();updateInternalShareMeta();moveRoundSettings()}catch(e){console.warn('Patch V27 não aplicado completamente',e)}
  }
  window.addEventListener('load',function(){
    install();
    setTimeout(install,150);
    setTimeout(install,700);
  });
})();
<\/script>`;
  try{
    const res=await fetch(API,{cache:'no-store'});
    if(!res.ok)throw new Error('Falha ao buscar banco original: '+res.status);
    const json=await res.json();
    let html=decodeBase64Utf8(json.content);
    html=html.replace(/Concurso Bíblico Oanse Cordeiro V26/g,'Concurso Bíblico Oanse Cordeiro V27');
    html=html.replace(/V26 OANSE · Banco Revisado V26/g,'V27 OANSE · Layout simplificado');
    html=html.replace('</body>',patchScript+'\n</body>');
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    document.body.innerHTML='<div class="loader"><h1>Não consegui carregar o jogo</h1><p>'+String(err.message||err)+'</p><p>Atualize a página. Se persistir, avise para restaurarmos a versão anterior.</p></div>';
  }
})();
</script>
</body>
</html>
